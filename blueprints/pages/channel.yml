title: Inhaltskanal
icon: layers
status:
  draft:
    label: Entwurf
    text: Kanal ist nur im Panel sichtbar
  listed:
    label: Veröffentlicht
    text: Kanal ist aktiv und kann Bildschirmen zugewiesen werden

columns:
  - width: 2/3
    sections:
      info:
        type: fields
        fields:
          title:
            label: Kanalname
            type: text
            required: true
            placeholder: z.B. Haupt-Inhaltskanal
            width: 2/3

          channel_id:
            label: Kanal-ID
            type: text
            required: true
            width: 1/3

          description:
            label: Beschreibung
            type: textarea
            maxlength: 500
            buttons: false
            placeholder: Beschreiben Sie den Zweck dieses Kanals
            help: Nur zur internen Referenz

      default_background:
        type: fields
        fields:
          info_background:
            type: info
            label: Standard-Hintergrund
            theme: notice
            text: Dieser Hintergrund wird für Folien verwendet, die keine eigenen Hintergrundmedien haben.

          default_bg_image:
            label: Standard-Hintergrundbild
            type: files
            max: 1
            layout: cards
            width: 1/2
            uploads:
              template: blocks/image
            help: Fallback-Hintergrund für Folien ohne eigene Medien

          default_bg_video:
            label: Standard-Hintergrundvideo
            type: files
            max: 1
            layout: cards
            width: 1/2
            uploads:
              template: blocks/video
            accepts:
              - video/mp4
              - video/webm
            help: Optionales Endlosvideo-Hintergrund (überschreibt Bild)

          default_overlay_color:
            label: Standard-Overlay-Farbe
            type: color
            width: 1/2
            default: "#000000"
            help: Farbüberlagerung auf Hintergrundmedien

          default_overlay_opacity:
            label: Standard-Overlay-Deckkraft
            type: range
            width: 1/2
            min: 0
            max: 100
            step: 5
            default: 40
            after: "%"
            help: 0% = kein Overlay, 100% = Volltonfarbe

      slides:
        type: pages
        label: Inhaltsfolien
        template: slide
        create: slide
        info: "{{ page.slide_type.or('blocks') }} — {{ page.calculatedDuration }} Sek."
        sortable: true
        status: all
        help: |
          Ziehen zum Neuanordnen der Folien. Dauer wird automatisch basierend auf dem Inhalt berechnet.
          Verschiedene Folientypen hinzufügen: Blöcke (Text/Bilder), Videos oder Kalenderansichten.
        empty: Noch keine Folien. Klicken Sie auf "Hinzufügen", um Ihre erste Inhaltsfolie zu erstellen.

  - width: 1/3
    sections:
      stats:
        type: fields
        fields:
          info_stats:
            type: info
            label: Kanalstatistiken
            theme: info
            text: |
              **Anzahl Folien:** {{ page.children.count }}
              **Gesamtdauer:** {{ page.children.sum('calculatedDuration') }} Sekunden

      preview:
        type: fields
        fields:
          info_preview:
            type: info
            label: Vorschau
            theme: notice
            text: |
              Vorschau der Folien im Panel oder weisen Sie diesen Kanal einem Bildschirm zu, um ihn in Aktion zu sehen.

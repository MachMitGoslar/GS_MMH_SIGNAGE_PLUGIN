title: Signage-Bildschirm
icon: display
status:
  draft:
    label: Entwurf
    text: Bildschirm ist nicht aktiv
  unlisted:
    label: Aktiv
    text: Bildschirm ist aktiv

columns:
  - width: 2/3
    sections:
      settings:
        type: fields
        fields:
          title:
            label: Bildschirmname
            type: text
            required: true
            placeholder: z.B. Lobby-Display
            help: Interner Name für diesen Bildschirm
            width: 2/3

          screen_id:
            label: Bildschirm-ID
            type: text
            required: true
            help: Wird in URL verwendet (z.B. /signage/lobby-screen)
            width: 1/3
            icon: url

          orientation:
            label: Bildschirmausrichtung
            type: select
            options:
              horizontal: Horizontal (Querformat)
              vertical: Vertikal (Hochformat)
            default: horizontal
            width: 1/2
            help: Beeinflusst Inhaltslayout und Übergänge

          status:
            label: Bildschirmstatus
            type: toggle
            text:
              - Inaktiv
              - Aktiv
            default: true
            width: 1/2

      schedule:
        type: fields
        fields:
          info_schedule:
            type: info
            label: Kanal & Zeitplan
            theme: positive
            text: Konfigurieren Sie, welcher Inhaltskanal angezeigt wird und wann der Bildschirm aktiv ist

          assigned_channel:
            label: Primärer Kanal
            type: select
            options: query
            query: site.find('signage/channels').children.listed.add(site.find('signage/channels').drafts)
            text: "{{ page.title }}"
            help: Standardkanal, wenn kein Zeitplan aktiv ist
            required: true
            empty: Keine Kanäle vorhanden - erstellen Sie zuerst einen

          channel_schedule:
            label: Zeitbasierter Kanalplan
            type: structure
            fields:
              channel:
                label: Kanal
                type: select
                options: query
                query: site.find('signage/channels').children.listed.add(site.find('signage/channels').drafts)
                text: "{{ page.title }}"
                width: 1/2
                required: true
              time_start:
                label: Startzeit
                type: time
                width: 1/4
                required: true
                step: 15
              time_end:
                label: Endzeit
                type: time
                width: 1/4
                required: true
                step: 15
            help: Automatischer Kanalwechsel zu bestimmten Zeiten (z.B. Morgen- vs. Nachmittagsinhalte). Zeiten dürfen sich nicht überschneiden.
            max: 10

          active_times:
            label: Aktive Zeiten
            type: structure
            fields:
              start:
                label: Startzeit
                type: time
                width: 1/3
                required: true
                step: 15
                default: "08:00"
              end:
                label: Endzeit
                type: time
                width: 1/3
                required: true
                step: 15
                default: "18:00"
              days:
                label: Tage
                type: checkboxes
                width: 1/3
                columns: 2
                options:
                  mon: Mo
                  tue: Di
                  wed: Mi
                  thu: Do
                  fri: Fr
                  sat: Sa
                  sun: So
                default:
                  - mon
                  - tue
                  - wed
                  - thu
                  - fri
            help: Bildschirm zeigt Inhalte nur während dieser Zeiten. Außerhalb wird der Standby-Modus angezeigt.
            max: 5

      standby:
        type: fields
        fields:
          info_standby:
            type: info
            label: Standby-Modus
            theme: info
            text: Konfigurieren Sie, was außerhalb der aktiven Zeiten angezeigt wird

          standby_mode:
            label: Standby-Anzeige
            type: select
            options:
              blank: Schwarzer Bildschirm
              logo: Nur Logo anzeigen
              custom: Eigene Nachricht + Bild
            default: custom
            width: 1/2

          standby_transition:
            label: Übergangsdauer
            type: number
            default: 5
            min: 0
            max: 60
            step: 5
            after: Sekunden
            width: 1/2
            help: Einblendzeit beim Wechsel in Standby

          standby_image:
            label: Standby-Bild
            type: files
            max: 1
            layout: cards
            size: medium
            accepts:
              - image/jpeg
              - image/png
              - image/webp
              - image/svg+xml
            when:
              standby_mode: custom
            help: Hintergrundbild für Standby-Bildschirm

          standby_message:
            label: Standby-Nachricht
            type: textarea
            maxlength: 500
            buttons: false
            when:
              standby_mode: custom
            placeholder: z.B. "Anzeige wird um 8:00 Uhr fortgesetzt"
            help: Optionale Nachricht während Standby

  - width: 1/3
    sections:
      preview:
        type: fields
        fields:
          info_preview:
            type: info
            label: Bildschirmzugriff
            theme: notice
            text: |
              **Bildschirm-URL:**
              /signage/{{ page.slug }}

              **Status:** {{ page.status.toBool ? '🟢 Aktiv' : '🔴 Inaktiv' }}
              **Ausrichtung:** {{ page.orientation.or('horizontal') }}

          preview_button:
            type: info
            text: |
              <a href="/signage/{{ page.slug }}" target="_blank" class="k-button">
                <span class="k-button-text">Bildschirm öffnen</span>
              </a>

      access_control:
        type: fields
        fields:
          info_access:
            type: info
            label: Zugriffskontrolle
            theme: positive
            text: Kontrollieren Sie, welche Geräte diesen Bildschirm anzeigen können

          whitelist_enabled:
            label: Zugriffsmodus
            type: toggle
            text:
              - Öffentlich (keine Einschränkung)
              - Nur Whitelist (Genehmigung erforderlich)
            default: true
            help: Bei Aktivierung müssen neue Geräte vor der Anzeige genehmigt werden

      pending_requests_display:
        type: fields
        fields:
          pending_requests:
            label: Genehmigte Geräte
            help: Übersicht der Geräte, die aktuell für diesen Bildschirm freigegeben sind
            type: pending_requests
            screen: "{{ page.slug }}"

      info:
        type: fields
        fields:
          info_help:
            type: info
            label: Hilfe
            theme: info
            text: |
              **Schnellstart:**
              1. Ausrichtung & aktive Zeiten festlegen
              2. Inhaltskanal zuweisen
              3. Zugriffskontrolle konfigurieren
              4. Bildschirm-URL öffnen

              **Problemlösung:**
              - Kein Inhalt? Prüfen Sie, ob der Kanal Folien hat
              - Zugriff verweigert? Whitelist-Einstellungen prüfen
              - Falsches Timing? Aktive Zeiten überprüfen

title: Beschilderung
icon: display
options:
  changeSlug: false
  changeStatus: false
  changeTitle: false
  delete: false

tabs:
  screens:
    label: Bildschirme
    icon: display
    columns:
      - width: 1/1
        sections:
          screens:
            type: pages
            label: Anzeige-Bildschirme
            parent: site.find('signage/screens')
            query: site.find('signage/screens').children
            template: screen
            status: all
            info: "{{ page.orientation }} — {{ page.status.toBool ? 'Aktiv' : 'Inaktiv' }}"
            image:
              query: page.standby_image.toFile
              cover: true
            empty: Noch keine Bildschirme konfiguriert
            help: Erstellen und verwalten Sie digitale Signage-Bildschirme

  channels:
    label: Kanäle
    icon: layers
    columns:
      - width: 1/1
        sections:
          channels:
            type: pages
            label: Inhaltskanäle
            parent: site.find('signage/channels')
            query: site.find('signage/channels').children
            template: channel
            status: all
            info: "{{ page.children.count }} Folien"
            empty: Noch keine Inhaltskanäle vorhanden
            help: Organisieren Sie Inhalte in wiederverwendbare Kanäle

  onboarding:
    label: Geräteverwaltung
    icon: bolt
    columns:
      - width: 1/1
        sections:
          onboarding_requests_section:
            type: fields
            fields:
              onboarding_requests:
                label: Geräteanfragen
                type: onboarding_requests

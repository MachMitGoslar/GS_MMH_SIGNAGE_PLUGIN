name: Signage Heading
icon: title
preview: heading
wysiwyg: true
fields:
  level:
    label: Heading Level
    type: select
    default: h2
    options:
      h1: Heading 1
      h2: Heading 2
      h3: Heading 3
    width: 1/2
  text:
    label: Text
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - textcolor
    placeholder: Enter heading text...
